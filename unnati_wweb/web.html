<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Purchase Billing</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f4f6fb;padding:20px;}
.container{
    max-width:1300px;margin:auto;background:white;
    padding:25px;border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}
h2{text-align:center;margin-bottom:20px;color:#333;}
.section{margin-bottom:25px;}
.section h3{margin-bottom:10px;color:#444;border-bottom:1px solid #eee;padding-bottom:5px;}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}
input,select{
    padding:10px;border:1px solid #ddd;border-radius:6px;width:100%;
}
.table-wrapper{overflow-x:auto;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #eee;padding:8px;text-align:center;}
th{background:#4a63e7;color:white;}
.btn{
    padding:8px 14px;border:none;border-radius:6px;
    cursor:pointer;font-size:14px;
}
.add-btn{background:#4a63e7;color:white;}
.delete-btn{background:#e74c3c;color:white;}
.print-btn{background:#28a745;color:white;}
.summary{
    margin-top:20px;background:#fafbff;
    padding:15px;border-radius:8px;border:1px solid #eee;
}
.summary h3{color:#4a63e7;}
.hidden{display:none;}
@media print{
    .btn{display:none;}
}
</style>

<script>

function toggleGST(){
    let type=document.getElementById("gst_type").value;
    let gstCols=document.querySelectorAll(".gst-col");

    gstCols.forEach(col=>{
        col.style.display=(type==="with")?"table-cell":"none";
    });

    calculateTotal();
}

function addRow(){
    let table=document.getElementById("itemTable");
    let row=table.insertRow(-1);

    row.innerHTML=`
        <td><input type="text"></td>

        <td>
            <select>
                <option>PCS</option>
                <option>KG</option>
                <option>BOX</option>
                <option>LTR</option>
                <option>METER</option>
                <option>SET</option>
                <option>DOZEN</option>
            </select>
        </td>

        <td><input type="number" value="1" oninput="calculateTotal()"></td>
        <td><input type="number" oninput="calculateTotal()"></td>

        <td>
            <select class="gst-col" oninput="calculateTotal()">
                <option value="0">0%</option>
                <option value="5">5%</option>
                <option value="12">12%</option>
                <option value="18">18%</option>
                <option value="28">28%</option>
            </select>
        </td>

        <td><input type="number" readonly></td>
        <td class="gst-col"><input type="number" readonly></td>
        <td><input type="number" readonly></td>

        <td><button class="btn delete-btn" onclick="deleteRow(this)">X</button></td>
    `;

    toggleGST();
}

function deleteRow(btn){
    btn.parentNode.parentNode.remove();
    calculateTotal();
}

function calculateTotal(){
    let table=document.getElementById("itemTable");
    let subtotal=0,totalGST=0,finalTotal=0;
    let type=document.getElementById("gst_type").value;

    for(let i=1;i<table.rows.length;i++){

        let qty=table.rows[i].cells[2].children[0].value||0;
        let price=table.rows[i].cells[3].children[0].value||0;
        let gstRate=table.rows[i].cells[4].children[0].value||0;

        let amount=qty*price;
        table.rows[i].cells[5].children[0].value=amount.toFixed(2);

        let gstAmount=0;

        if(type==="with"){
            gstAmount=amount*gstRate/100;
            table.rows[i].cells[6].children[0].value=gstAmount.toFixed(2);
        }

        let total=amount+gstAmount;
        table.rows[i].cells[7].children[0].value=total.toFixed(2);

        subtotal+=amount;
        totalGST+=gstAmount;
        finalTotal+=total;
    }

    finalTotal+=parseFloat(document.getElementById("transport_charge").value)||0;

    document.getElementById("subtotal").innerText=subtotal.toFixed(2);
    document.getElementById("gstTotal").innerText=totalGST.toFixed(2);
    document.getElementById("grand").innerText=finalTotal.toFixed(2);
}

</script>
</head>

<body>

<div class="container">

<h2>Professional Purchase Billing</h2>

<!-- Supplier Section -->
<div class="section">
<h3>Supplier Details</h3>
<div class="grid">
<input type="text" placeholder="Supplier Name">
<input type="text" placeholder="Supplier GST No">
<input type="text" placeholder="Mobile">
<input type="text" placeholder="City">
<input type="text" placeholder="State">
<input type="text" placeholder="Bill No">
<input type="date">
<select id="gst_type" onchange="toggleGST()">
<option value="with">With GST</option>
<option value="without">Without GST</option>
</select>
</div>
</div>

<!-- Transport Section -->
<div class="section">
<h3>Transport Details</h3>
<div class="grid">
<input type="text" placeholder="Vehicle Number">
<input type="text" placeholder="LR / LT Number">
<input type="number" id="transport_charge" value="0" oninput="calculateTotal()" placeholder="Transport Charges">
</div>
</div>

<!-- Items -->
<div class="section">
<h3>Items</h3>

<div class="table-wrapper">
<table id="itemTable">
<tr>
<th>Item</th>
<th>Unit</th>
<th>Qty</th>
<th>Price</th>
<th class="gst-col">GST %</th>
<th>Amount</th>
<th class="gst-col">GST Amt</th>
<th>Total</th>
<th>Action</th>
</tr>
</table>
</div>

<br>
<button class="btn add-btn" onclick="addRow()">+ Add Item</button>

</div>

<!-- Summary -->
<div class="summary">
<p>Subtotal: ₹ <span id="subtotal">0.00</span></p>
<p>Total GST: ₹ <span id="gstTotal">0.00</span></p>
<hr>
<h3>Grand Total: ₹ <span id="grand">0.00</span></h3>
</div>

<br>
<button class="btn print-btn" onclick="window.print()">Print Bill</button>

</div>

</body>
</html>
